default_stages: [pre-commit]
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: CHANGELOG.md
      - id: check-json
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: pretty-format-json
        args: [--autofix, --indent=2, --no-sort-keys]
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/frnmst/md-toc
    rev: 9.0.0
    hooks:
      - id: md-toc
        files: ^README\.md$
        language_version: python3

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_docs
      - id: terraform_fmt
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.pre-commit-config/.tflint.hcl
      - id: terraform_checkov
        args:
          - --args=--config-file
          - --args=__GIT_WORKING_DIR__/.pre-commit-config/.checkov.yaml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .pre-commit-config/.secrets.baseline
          - --exclude-lines
          - .*(yor_trace|git_commit).*
          - --exclude-files
          - tests/.*|devtools/.*|terraform/main.auto.tfvars.json

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, ci, chore, test, docs, refactor]
