services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  wordpress:
    image: ${WORDPRESS_IMAGE_NAME:-cloud1-wordpress:latest}
    build:
      context: .
      dockerfile: docker/wordpress/Dockerfile
      platforms:
        - ${DOCKER_PLATFORM:-linux/amd64}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENABLE_LOCAL_STACK: ${ENABLE_LOCAL_STACK:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/wordpress
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    image: ${NGINX_IMAGE_NAME:-cloud1-nginx:latest}
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      platforms:
        - ${DOCKER_PLATFORM:-linux/amd64}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORDPRESS_DOCUMENT_ROOT: /var/www/wordpress
      WORDPRESS_FPM_HOST: wordpress:9000
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - wordpress_data:/var/www/wordpress
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/healthz.php || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE_NAME:-cloud1-phpmyadmin:latest}
    build:
      context: .
      dockerfile: docker/phpmyadmin/Dockerfile
      platforms:
        - ${DOCKER_PLATFORM:-linux/amd64}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  mysql_data:
  wordpress_data:
